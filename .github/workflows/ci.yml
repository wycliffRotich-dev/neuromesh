name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: neuromesh
          POSTGRES_PASSWORD: neuromesh
          POSTGRES_DB: neuromesh_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U neuromesh -d neuromesh_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://neuromesh:neuromesh@localhost:5432/neuromesh_test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create database schema
        run: |
          PGPASSWORD=neuromesh psql \
            -h localhost \
            -U neuromesh \
            -d neuromesh_test \
            -f app/infrastructure/repositories/schema.sql

      - name: Run tests
        run: pytest -v

      - name: Lint with ruff
        run: ruff check .
